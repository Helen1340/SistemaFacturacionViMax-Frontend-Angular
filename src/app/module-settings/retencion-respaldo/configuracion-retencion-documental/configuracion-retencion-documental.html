<div id="overlay" class="hidden fixed inset-0 bg-black/50 z-40 md:hidden"></div>
<!-- Contenido principal -->
<main class="w-full md:ml-0 p-4 flex-1 overflow-auto">

    <!-- Main Content -->
    <div class="flex-1 flex flex-col overflow-hidden">
        <!-- Header -->
        <div class="-mt-2 mb-2">
            <h2 class="text-4xl font-semibold mb-5 mt-4">
                Configuración De Retención Documental
            </h2>
        </div>

        <div class="border-b-2 border-gray-300 w-full mb-6"></div>

        <!-- Content Area -->
        <main class="flex-1 overflow-y-auto p-6">
            <div class="max-w-7xl mx-auto">

                <!-- Formulario de Configuración -->
                <div class="bg-white rounded-2xl shadow-lg border border-gray-200 p-6">
                    <form class="space-y-6">
                        <!-- Tiempo mínimo de retención -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Tiempo mínimo de retención <span class="text-red-500">*</span>
                            </label>
                            <select [(ngModel)]="formData.tiempoMinimo" name="tiempoMinimo"
                                    class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500">
                                <option value="">Seleccione...</option>
                                <option value="1">1 año</option>
                                <option value="2">2 años</option>
                                <option value="3">3 años</option>
                                <option value="4">4 años</option>
                                <option value="5">5 años</option>
                                <option value="6">6 años</option>
                                <option value="7">7 años</option>
                                <option value="8">8 años</option>
                                <option value="9">9 años</option>
                                <option value="10">10 años</option>
                            </select>
                        </div>

                        <!-- Aplicar retención desde -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Aplicar retención desde <span class="text-red-500">*</span>
                            </label>
                            <input type="date" [(ngModel)]="formData.fechaAplicacion" name="fechaAplicacion"
                                   class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500">
                        </div>

                        <!-- Tipo de documentos retenidos -->
                        <div>
                            <label class="block text-sm font-medium text-gray-700 mb-2">
                                Tipo de documentos retenidos <span class="text-red-500">*</span>
                            </label>
                            <div class="grid grid-cols-2 gap-4">
                                <div class="space-y-3">
                                    <label class="flex items-center">
                                        <input type="checkbox" [(ngModel)]="formData.tiposDocumentos.XML" name="xml"
                                               class="mr-2 rounded border-gray-300 text-cyan-600 focus:ring-cyan-500">
                                        <span class="text-sm text-gray-700">XML</span>
                                    </label>
                                    <label class="flex items-center">
                                        <input type="checkbox" [(ngModel)]="formData.tiposDocumentos.PDF" name="pdf"
                                               class="mr-2 rounded border-gray-300 text-cyan-600 focus:ring-cyan-500">
                                        <span class="text-sm text-gray-700">PDF</span>
                                    </label>
                                    <label class="flex items-center">
                                        <input type="checkbox" [(ngModel)]="formData.tiposDocumentos.CDR" name="cdr"
                                               class="mr-2 rounded border-gray-300 text-cyan-600 focus:ring-cyan-500">
                                        <span class="text-sm text-gray-700">CDR</span>
                                    </label>
                                </div>
                                <div class="space-y-3">
                                    <label class="flex items-center">
                                        <input type="checkbox" [(ngModel)]="formData.tiposDocumentos.notas" name="notas"
                                               class="mr-2 rounded border-gray-300 text-cyan-600 focus:ring-cyan-500">
                                        <span class="text-sm text-gray-700">Notas crédito/débito</span>
                                    </label>
                                    <label class="flex items-center">
                                        <input type="checkbox" [(ngModel)]="formData.tiposDocumentos.eventos" name="eventos"
                                               class="mr-2 rounded border-gray-300 text-cyan-600 focus:ring-cyan-500">
                                        <span class="text-sm text-gray-700">Eventos DIAN</span>
                                    </label>
                                    <label class="flex items-center">
                                        <input type="checkbox" [(ngModel)]="formData.tiposDocumentos.respuesta" name="respuesta"
                                               class="mr-2 rounded border-gray-300 text-cyan-600 focus:ring-cyan-500">
                                        <span class="text-sm text-gray-700">Respuesta de validación</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <!-- Permitir eliminación anticipada -->
                        <div>
                            <label class="flex items-center">
                                <input type="checkbox" [(ngModel)]="formData.eliminacionAnticipada" name="eliminacionAnticipada"
                                       class="mr-2 rounded border-gray-300 text-cyan-600 focus:ring-cyan-500">
                                <span class="text-sm text-gray-700">
                                    Permitir eliminación anticipada
                                    <span class="text-gray-500">(requiere auditoría legal o autorización formal)</span>
                                </span>
                            </label>
                        </div>

                        <!-- Botón de Guardar -->
                        <div class="flex justify-end pt-6">
                            <button type="submit" (click)="guardarConfiguracion()"
                                    class="px-8 py-3 bg-cyan-600 text-white rounded-lg hover:bg-cyan-700 transition-colors font-medium">
                                Guardar Configuración
                            </button>
                        </div>
                    </form>
                </div>

            </div>
        </main>
    </div>

</main>
