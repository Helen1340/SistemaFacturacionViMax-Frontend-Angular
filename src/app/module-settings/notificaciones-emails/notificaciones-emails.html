<main class="w-full md:ml-0 p-4 flex-1 overflow-auto">

    <div class="-mt-4 mb-2">
        <h2 class="text-3xl md:text-4xl font-semibold text-center md:text-left mb-6 pt-8">
            Preferencias de Notificaciones
        </h2>
    </div>

    <div class="border-b-2 border-gray-300 w-full mb-8"></div>

    <div class="w-full p-6">

        <div class="bg-white rounded-xl shadow-md overflow-hidden">
            <table class="w-full min-w-[600px] table-fixed text-xs sm:text-sm text-left">
                <thead class="bg-gray-100 text-gray-700">
                    <tr>
                        <th class="px-6 py-3">Tipo de Notificación</th>
                        <th class="px-6 py-3">Descripción</th>
                        <th class="px-6 py-3 text-center">Activar</th>
                    </tr>
                </thead>
                <tbody class="text-gray-800">
                    <!-- 1 -->
                    <tr class="border border-gray-200">
                        <td class="px-6 py-4 font-medium">Factura aceptada</td>
                        <td class="px-6 py-4">Recibir notificación cuando la DIAN acepte una factura.</td>
                        <td class="px-6 py-4 text-center">
                            <input type="checkbox" class="w-5 h-5 text-cyan-600 accent-cyan-600 rounded"
                                [(ngModel)]="preferences.notify_invoice_accepted">
                        </td>
                    </tr>

                    <!-- 2 -->
                    <tr class="border border-gray-200">
                        <td class="px-6 py-4 font-medium">Factura rechazada</td>
                        <td class="px-6 py-4">Recibir aviso si la DIAN rechaza una factura emitida.</td>
                        <td class="px-6 py-4 text-center">
                            <input type="checkbox" class="w-5 h-5 text-cyan-600 accent-cyan-600 rounded"
                                [(ngModel)]="preferences.notify_invoice_rejected">
                        </td>
                    </tr>

                    <!-- 3 -->
                    <tr class="border border-gray-200">
                        <td class="px-6 py-4 font-medium">Factura cancelada</td>
                        <td class="px-6 py-4">Alertas si se anula una factura.</td>
                        <td class="px-6 py-4 text-center">
                            <input type="checkbox" class="w-5 h-5 text-cyan-600 accent-cyan-600 rounded"
                                [(ngModel)]="preferences.notify_invoice_canceled">
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- BOTONES -->
        <div class="flex justify-end gap-4 mt-6">
            <button (click)="savePreferences()"
                class="bg-cyan-600 text-white px-6 py-2 rounded hover:bg-cyan-700 text-sm">Guardar</button>
            <button class="bg-gray-400 text-white px-6 py-2 rounded hover:bg-gray-500 text-sm">Cancelar</button>
        </div>

    </div>
</main>
