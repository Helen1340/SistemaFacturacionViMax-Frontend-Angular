<main class="w-full md:ml-0 p-4 flex-1 overflow-auto">
    <div class="-mt-4 mb-2">
        <h2 class="text-4xl font-semibold mb-10 mt-4">
            Editar Resolución: {{ resolutionData.prefix || 'Cargando...' }} - {{ resolutionData.resolution_number || '...' }}
        </h2>
    </div>
    <div class="border-b-2 w-full mb-8 border-gray-300"></div>

    <div class="bg-white rounded-2xl shadow overflow-hidden">
        <div class="overflow-y-auto max-h-[600px] relative scrollbar-thin scrollbar-thumb-gray-400 scrollbar-track-gray-200">
            <form (ngSubmit)="updateResolution()" #editResolutionForm="ngForm" class="p-8 w-full max-w-5xl mx-auto">
                
                @if (isLoading) {
                    <div class="text-center py-10 text-gray-500">Cargando datos de la resolución...</div>
                } 
                
                @if (!isLoading) {
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div>
                            <label class="block text-base font-medium mb-1">Prefijo <span class="text-red-500">*</span></label>
                            <input type="text" name="prefix" [(ngModel)]="resolutionData.prefix" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-base focus:outline-none" placeholder="Prefijo" required maxlength="10" />
                        </div>
                        <div>
                            <label class="block text-base font-medium mb-1">Número de resolución DIAN <span class="text-red-500">*</span></label>
                            <input type="text" name="resolution_number" [(ngModel)]="resolutionData.resolution_number" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-base focus:outline-none" placeholder="Número de resolución" required maxlength="50" />
                        </div>
                        <div>
                            <label class="block text-base font-medium mb-1">Tipo de documento <span class="text-red-500">*</span></label>
                            <select name="document_type" [(ngModel)]="resolutionData.document_type" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-base focus:outline-none appearance-none" required>
                                <option value="" disabled>Seleccione...</option>
                                <option value="Factura">Factura</option>
                                <option value="NotaCredito">Nota Crédito</option>
                                <option value="NotaDebito">Nota Débito</option>
                            </select>
                        </div>
                        <div>
                            <label class="block text-base font-medium mb-1">Fecha de resolución <span class="text-red-500">*</span></label>
                            <input type="date" name="resolution_date" [(ngModel)]="resolutionData.resolution_date" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-base focus:outline-none" required />
                        </div>
                        
                        

                        <div>
                            <label class="block text-base font-medium mb-1">Fecha de inicio de vigencia <span class="text-red-500">*</span></label>
                            <input type="date" name="validity_start_date" [(ngModel)]="resolutionData.validity_start_date" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-base focus:outline-none" required />
                        </div>
                        <div>
                            <label class="block text-base font-medium mb-1">Fecha de fin de vigencia <span class="text-red-500">*</span></label>
                            <input type="date" name="validity_end_date" [(ngModel)]="resolutionData.validity_end_date" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-base focus:outline-none" required />
                        </div>
                        <div>
                            <label class="block text-base font-medium mb-1">Rango inicial (Desde) <span class="text-red-500">*</span></label>
                            <input type="number" name="start_number" [(ngModel)]="resolutionData.start_number" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-base focus:outline-none" placeholder="Rango inicial" required />
                        </div>
                        <div>
                            <label class="block text-base font-medium mb-1">Rango final (Hasta) <span class="text-red-500">*</span></label>
                            <input type="number" name="end_number" [(ngModel)]="resolutionData.end_number" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-base focus:outline-none" placeholder="Rango final" required />
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-base font-medium mb-1">Cantidad disponible (Calculada automáticamente)</label>
                            <input type="text" [value]="resolutionData.end_number > resolutionData.start_number ? (resolutionData.end_number - resolutionData.start_number + 1) : 0" 
                                class="w-full border border-gray-300 rounded-xl px-4 py-3 text-base bg-gray-100 font-semibold" readonly />
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-base font-medium mb-1">Estado actual <span class="text-red-500">*</span></label>
                            <select name="current_status" [(ngModel)]="resolutionData.current_status" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-base" required>
                                <option value="Activo">Activo</option>
                                <option value="Inactivo">Inactivo</option>
                            </select>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-base font-medium mb-1">Ambiente <span class="text-red-500">*</span></label>
                            <select name="environment" [(ngModel)]="resolutionData.environment" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-base" required>
                                <option value="Pruebas">Pruebas</option>
                                <option value="Produccion">Producción</option>
                            </select>
                        </div>
                        
                        <div class="md:col-span-2">
                            <label class="block text-base font-medium mb-1">Archivo de la resolución (opcional)</label>
                            <input type="file" (change)="onFileSelected($event)" accept="application/pdf" 
                                class="w-full border border-gray-300 rounded-xl px-4 py-3 text-base focus:outline-none" />
                            <span class="text-xs text-gray-500 mt-1 block">Tamaño máximo: 2 MB. Solo PDF.</span>
                        </div>
                        <div class="md:col-span-2">
                            <label class="block text-base font-medium mb-1">Observaciones</label>
                            <textarea name="description" [(ngModel)]="resolutionData.description" class="w-full border border-gray-300 rounded-xl px-4 py-3 text-base focus:outline-none min-h-[100px]" placeholder="Observaciones" maxlength="255"></textarea>
                        </div>
                    </div>
                }

                <div class="col-span-full flex flex-col sm:flex-row justify-end gap-4 mt-6">
                    <button type="button" (click)="cancel()" class="w-full sm:w-auto bg-gray-300 hover:bg-gray-400 text-gray-800 font-medium py-2 px-6 sm:px-10 rounded-md shadow-sm">
                        Cancelar
                    </button>
                    <button type="submit" [disabled]="!editResolutionForm.valid || isLoading"
                        class="w-full sm:w-auto bg-cyan-600 hover:bg-cyan-700 disabled:bg-gray-400 
                        text-white font-medium py-2 px-6 sm:px-10 rounded-md shadow-sm 
                        focus:ring-2 focus:ring-offset-2 focus:ring-cyan-500 text-center">
                        Actualizar Resolución
                    </button>
                </div>
            </form>
        </div>
    </div>
</main>
