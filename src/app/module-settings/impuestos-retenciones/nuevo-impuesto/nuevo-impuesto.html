<main class="w-full p-4 flex-1">

  <div class="sticky top-0 bg-white z-10 pb-4 mt-6">
    <h2 class="text-4xl font-semibold mb-4 mt-2">Nuevo Impuesto</h2>
    <div class="border-b-2 border-gray-300 w-full"></div>
  </div>

  <!-- CONTENEDOR PRINCIPAL -->
  <div class="max-w-10xl mx-auto sm:px-6 lg:px-8">
    <div class="bg-white rounded-lg shadow-xl p-4 sm:p-6 lg:p-8 
        max-h-[75vh] overflow-y-auto scrollbar-thin scrollbar-thumb-gray-400 scrollbar-track-gray-200">

      <div class="relative flex justify-end mb-4">
        <button (click)="goBack()" 
          class="bg-gray-600 hover:bg-gray-700 text-white px-8 py-2 rounded-2xl flex items-center">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" class="mr-2">
            <path d="M19 12H5M12 19L5 12L12 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Volver
        </button>
      </div>
      
      <!-- INFORMACIÓN -->
      <div class="mb-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
        <div class="flex items-start">
          <svg class="w-5 h-5 text-blue-600 mt-0.5 mr-3" fill="currentColor" viewBox="0 0 20 20">
            <path fill-rule="evenodd" d="M18 10a8 8 0 11-16 0 8 8 0 0116 0zm-7-4a1 1 0 11-2 0 1 1 0 012 0zM9 9a1 1 0 000 2v3a1 1 0 001 1h1a1 1 0 100-2v-3a1 1 0 00-1-1H9z" clip-rule="evenodd"/>
          </svg>
          <div>
            <h3 class="text-sm font-medium text-blue-800">Información</h3>
            <p class="text-sm text-blue-700 mt-1">
              Selecciona uno o más impuestos de la lista oficial de la DIAN. 
              Cada impuesto se creará con su configuración estándar.
            </p>
          </div>
        </div>
      </div>

      <!-- CONTADOR DE SELECCIONADOS -->
      <div class="mb-6 flex items-center justify-between">
        <div class="flex items-center gap-4">
          <span class="text-sm text-gray-600">
            Impuestos seleccionados: 
            <span class="font-semibold text-blue-600">{{ selectedImpuestos.length }}</span>
          </span>
          <button 
            *ngIf="selectedImpuestos.length > 0"
            (click)="clearSelection()"
            class="text-sm text-red-600 hover:text-red-800 underline">
            Limpiar selección
          </button>
        </div>
        <div class="flex items-center gap-2">
          <input 
            type="checkbox" 
            id="selectAll"
            [checked]="isAllSelected()"
            [indeterminate]="isIndeterminate()"
            (change)="toggleSelectAll()"
            class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500">
          <label for="selectAll" class="text-sm font-medium text-gray-700">Seleccionar todos</label>
        </div>
      </div>

      <!-- LISTA DE IMPUESTOS -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        <div *ngFor="let impuesto of impuestosDIAN; trackBy: trackByImpuesto" 
             class="border border-gray-200 rounded-lg p-4 hover:border-blue-300 hover:shadow-md transition-all duration-200 impuesto-card"
             [class.bg-blue-50]="isSelected(impuesto.codigo)"
             [class.border-blue-300]="isSelected(impuesto.codigo)">
          
          <div class="flex items-start gap-3">
            <input 
              type="checkbox" 
              [id]="'impuesto-' + impuesto.codigo"
              [checked]="isSelected(impuesto.codigo)"
              (change)="toggleImpuesto(impuesto)"
              class="w-4 h-4 text-blue-600 border-gray-300 rounded focus:ring-blue-500 mt-1">
            
            <div class="flex-1 min-w-0">
              <label [for]="'impuesto-' + impuesto.codigo" class="block cursor-pointer">
                <div class="flex items-center gap-2 mb-2">
                  <span class="text-sm font-medium text-gray-900 truncate flex-1 impuesto-nombre">{{ impuesto.nombre }}</span>
                  <span class="text-xs bg-gray-100 text-gray-600 px-2 py-1 rounded flex-shrink-0">{{ impuesto.codigo }}</span>
                </div>
                <p class="text-sm text-gray-600 mb-2 impuesto-descripcion">{{ impuesto.descripcion }}</p>
                <div class="flex items-center gap-4 text-xs text-gray-500">
                  <span>Tipo: {{ impuesto.tipo }}</span>
                  <span>Porcentaje: {{ impuesto.porcentaje }}%</span>
                </div>
              </label>
            </div>
          </div>
        </div>
      </div>


      <!-- BOTONES DE ACCIÓN -->
      <div class="flex justify-end gap-4 pt-8 border-t border-gray-200 mt-8">
        <button 
          type="button" 
          (click)="goBack()"
          class="px-6 py-3 text-gray-600 bg-gray-100 hover:bg-gray-200 rounded-lg transition-colors font-medium">
          Cancelar
        </button>
        <button 
          type="button" 
          (click)="agregarImpuestos()"
          [disabled]="selectedImpuestos.length === 0 || isLoading"
          class="bg-green-600 hover:bg-green-700 text-white px-8 py-2 rounded-2xl flex items-center disabled:bg-gray-400 disabled:cursor-not-allowed transition-colors font-medium">
          <svg *ngIf="isLoading" class="animate-spin h-4 w-4 mr-2" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4" fill="none"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
          </svg>
          {{ isLoading ? 'Agregando...' : 'Agregar ' + selectedImpuestos.length + ' Impuesto(s)' }}
        </button>
      </div>
    </div>
  </div>
</main>
