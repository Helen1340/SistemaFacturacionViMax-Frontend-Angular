<main class="min-h-screen bg-gray-50 flex flex-col items-center p-4">
    <!-- Logo -->
    <div class="flex flex-col items-center mt-8 mb-10">
        <div class="w-28 h-28 rounded-full bg-gray-200 flex items-center justify-center text-gray-600 text-sm">
            Logo
        </div>
        <p class="mt-2 text-gray-600 text-sm">Logo de la empresa</p>
        <input type="file" class="mt-2 text-sm" />
    </div>

    <!-- Formulario principal -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()"
        class="bg-white shadow-md rounded-2xl w-full max-w-7xl p-8 space-y-8">
        <!-- Secciones principales -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
            <!-- DETALLES DE LA EMPRESA -->
            <div>
                <h2 class="text-lg font-semibold text-gray-800 mb-4">Detalles de la Empresa</h2>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600">Razón social</label>
                        <input formControlName="razon_social" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600">Nombre Comercial</label>
                        <input formControlName="nombre_comercial" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600">NIT</label>
                        <input formControlName="nit" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600">Régimen tributario</label>
                        <select formControlName="regimen" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Seleccione...</option>
                            <option value="Regimen Ordinario">Régimen Ordinario</option>
                            <option value="Regimen Simple de Tributación (RTS)">Régimen Simple de Tributación (RTS)</option>
                            <option value="Regimen Tributario Especial (RTE)">Régimen Tributario Especial (RTE)</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600">Actividad Económica (CIIU)</label>
                        <input formControlName="codigo_ciiu" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600">¿Es responsable del IVA?</label>
                        <input type="checkbox" class="w-4 h-4" />
                    </div>
                </div>
            </div>

            <!-- INFORMACIÓN BÁSICA -->
            <div>
                <h2 class="text-lg font-semibold text-gray-800 mb-4">Información Básica</h2>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600">Dirección</label>
                        <input formControlName="direccion" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600">Ciudad / Municipio</label>
                        <input formControlName="ciudad" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600">Departamento</label>
                        <input formControlName="departamento" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600">País</label>
                        <input formControlName="pais" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600">Teléfono</label>
                        <input formControlName="telefono" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600">Correo de la Empresa</label>
                        <input formControlName="correo_electronico" type="email" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                </div>
            </div>

            <!-- REPRESENTANTE LEGAL -->
            <div>
                <h2 class="text-lg font-semibold text-gray-800 mb-4">Representante Legal</h2>

                <div class="space-y-4">
                    <div>
                        <label class="block text-sm text-gray-600">Nombre completo</label>
                        <input formControlName="representante_nombre" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600">Tipo de Documento</label>
                        <select formControlName="representante_tipo_documento" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Seleccione...</option>
                            <option value="CC">Cédula de ciudadanía</option>
                            <option value="CE">Cédula de extranjería</option>
                            <option value="NIT">NIT</option>
                            <option value="PAS">Pasaporte</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-sm text-gray-600">Número de Documento</label>
                        <input formControlName="representante_numero_documento" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                    </div>
                </div>
            </div>
        </div>

        <!-- DATOS DEL USUARIO FACTURADOR -->
        <div class="border-t pt-8 mt-6">
            <h2 class="text-lg font-semibold text-gray-800 mb-4">Datos del Usuario Facturador</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div>
                    <label class="block text-sm text-gray-600">Nombre completo</label>
                    <input formControlName="nombre" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                </div>

                <div>
                    <label class="block text-sm text-gray-600">Tipo de Documento</label>
                    <select formControlName="tipo_documento" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
                        <option value="">Seleccione...</option>
                        <option value="CC">Cédula de ciudadanía</option>
                        <option value="CE">Cédula de extranjería</option>
                        <option value="NIT">NIT</option>
                        <option value="PAS">Pasaporte</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm text-gray-600">Número de Documento</label>
                    <input formControlName="numero_documento" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                </div>

                <div>
                    <label class="block text-sm text-gray-600">Correo del Usuario</label>
                    <input formControlName="correo_usuario" type="email" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                </div>

                <div>
                    <label class="block text-sm text-gray-600">Dirección</label>
                    <input formControlName="direccion_usuario" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                </div>

                <div>
                    <label class="block text-sm text-gray-600">Teléfono</label>
                    <input formControlName="telefono_usuario" type="text" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500" />
                </div>

                <div class="md:col-span-2">
                    <label class="block text-sm text-gray-600">Descripción</label>
                    <textarea formControlName="descripcion" rows="3" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
            </div>
        </div>

        <!-- BOTÓN GUARDAR -->
        <div class="flex justify-center mt-8">
            <button type="submit" [disabled]="isLoading"
                class="bg-blue-600 hover:bg-blue-700 text-white px-8 py-3 rounded-lg font-medium shadow transition disabled:opacity-70">
                {{ isLoading ? 'Guardando...' : 'Guardar y continuar' }}
            </button>
        </div>
    </form>

    <!-- Notificación -->
    <div *ngIf="notification.show" [ngClass]="{
        'bg-green-500': notification.type === 'success',
        'bg-red-500': notification.type === 'error'
    }" class="fixed bottom-5 right-5 text-white px-4 py-3 rounded-lg shadow-md transition">
        {{ notification.message }}
    </div>
</main>
