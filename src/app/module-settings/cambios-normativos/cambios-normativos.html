<div id="overlay" class="hidden fixed inset-0 bg-black/50 z-40 md:hidden"></div>
<!-- Contenido principal -->
<main class="w-full py-4 flex-1 overflow-y-auto overflow-x-visible">

  <div class="-mt-4 mb-4">
    <h2 class="text-4xl font-semibold mb-6 mt-8">Gestión de Cambios Normativos y Actualizaciones Técnicas Automáticas</h2>
  </div>

  <div class="border-b-2 border-gray-300 w-full mb-8"></div>

  <!-- Botón de Configuración -->
  <div class="mb-8">
    <button (click)="navigateConfiguracionActualizaciones()"
        class="bg-cyan-600 hover:bg-cyan-700 text-white px-8 py-4 rounded-2xl flex items-center justify-center transition-colors duration-200 w-fit">
        <span class="text-lg font-medium">Configuración de actualizaciones automáticas</span>
    </button>
  </div>

  <!-- Barra de búsqueda -->
  <div class="mb-6 bg-white rounded-2xl shadow-lg border border-gray-200 p-6">
    <label class="block text-sm font-medium text-gray-700 mb-2">Buscar</label>
    <div class="relative">
      <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
        <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
      </div>
      <input type="text" [(ngModel)]="searchTerm" (input)="onSearch()"
             class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500"
             placeholder="Buscar...">
    </div>
  </div>

  <!-- Tabla de Cambios -->
  <div class="bg-white rounded-2xl shadow-lg border border-gray-200">
    <div class="overflow-x-auto">
      <table class="w-full table-auto">
        <thead class="bg-gray-100 text-black text-left sticky top-0 z-10">
          <tr>
            <th class="px-4 py-3 font-semibold min-w-[120px] rounded-tl-2xl">Fecha</th>
            <th class="px-4 py-3 font-semibold min-w-[300px]">Cambio aplicado</th>
            <th class="px-4 py-3 font-semibold min-w-[120px]">Fuente</th>
            <th class="px-4 py-3 font-semibold min-w-[120px]">Estado</th>
            <th class="px-4 py-3 font-semibold min-w-[150px] rounded-tr-2xl">Responsable</th>
          </tr>
        </thead>
        <tbody>
          <tr class="border-t border-gray-200 hover:bg-gray-50">
            <td class="px-4 py-3 text-gray-400 text-sm">-</td>
            <td class="px-4 py-3 text-gray-400 text-sm">-</td>
            <td class="px-4 py-3 text-gray-400 text-sm">-</td>
            <td class="px-4 py-3 text-gray-400 text-sm">-</td>
            <td class="px-4 py-3 text-gray-400 text-sm">-</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</main>
