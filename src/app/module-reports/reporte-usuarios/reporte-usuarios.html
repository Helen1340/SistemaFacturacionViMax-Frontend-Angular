<main class="w-full md:ml-0 px-4 pb-2 flex-1 overflow-auto">
    <!-- Título -->
    <div>
        <h2 class="text-4xl font-semibold mb-6 mt-2">
            Reporte de Usuarios
        </h2>
    </div>

    <div class="border-b-2 border-gray-300 w-full mb-4"></div>

    <!-- Filtros -->
    <div class="bg-white rounded-xl shadow-md p-4">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 items-end">
            <div>
                <label class="text-sm font-medium text-black block mb-1">Buscar usuario</label>
                <div
                    class="flex items-center border border-gray-300 rounded-lg px-3 py-2 focus-within:ring-2 focus-within:ring-cyan-500">
                    <svg class="w-4 h-4 text-gray-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-4.35-4.35M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16z" />
                    </svg>
                    <input type="text" placeholder="Nombre o documento" [(ngModel)]="searchQuery"
                        class="w-full border-none outline-none text-black text-sm placeholder-gray-400" />
                </div>
            </div>
            <div>
                <label class="text-sm font-medium text-black block mb-1">Desde</label>
                <input type="date" [(ngModel)]="startDate"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black bg-white focus:outline-none focus:ring-2 focus:ring-cyan-500" />
            </div>
            <div>
                <label class="text-sm font-medium text-black block mb-1">Hasta</label>
                <input type="date" [(ngModel)]="endDate"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black bg-white focus:outline-none focus:ring-2 focus:ring-cyan-500" />
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mt-4 items-end">
            <div>
                <label class="text-sm font-medium text-black block mb-1">Correo electrónico</label>
                <input type="email" placeholder="correo@ejemplo.com" [(ngModel)]="email"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-cyan-500" />
            </div>
            <div>
                <label class="text-sm font-medium text-black block mb-1">Rol</label>
                <select
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black bg-white focus:outline-none focus:ring-2 focus:ring-cyan-500"
                    [(ngModel)]="role">
                    <option value="">Todos</option>
                    <option value="administrador">Administrador</option>
                    <option value="facturador">Facturador</option>
                    <option value="contador">Contador</option>
                    <option value="cliente">Cliente</option>
                </select>
            </div>
            <div>
                <label class="text-sm font-medium text-black block mb-1">Estado</label>
                <select
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black bg-white focus:outline-none focus:ring-2 focus:ring-cyan-500"
                    [(ngModel)]="status">
                    <option value="">Todos</option>
                    <option value="Activo">Activo</option>
                    <option value="Inactivo">Inactivo</option>
                    <option value="Bloqueado">Bloqueado</option>
                </select>
            </div>
        </div>

        <!-- BOTONES MEJORADOS -->
        <div class="flex flex-col md:flex-row gap-4 mt-6 items-center justify-between">
            <!-- Grupo izquierdo: Limpiar y Buscar -->
            <div class="flex flex-col xs:flex-row gap-3 w-full md:w-auto">
                <button (click)="clearFilters()"
                    class="bg-gray-200 text-gray-700 text-sm px-6 py-2 rounded-xl hover:bg-gray-300 transition whitespace-nowrap w-full xs:w-auto">
                    Limpiar filtros
                </button>
                <button (click)="applyFilters()"
                    class="bg-cyan-600 text-white text-sm px-6 py-2 rounded-xl hover:bg-cyan-700 transition whitespace-nowrap w-full xs:w-auto">
                    Buscar
                </button>
            </div>

            <!-- Grupo derecho: Exportaciones -->
            <div class="flex flex-col xs:flex-row gap-3 w-full md:w-auto">
                <button (click)="downloadCsv()"
                    class="bg-blue-600 text-white text-sm px-4 py-2 rounded-xl hover:bg-blue-700 transition whitespace-nowrap w-full xs:w-auto">
                    Descargar CSV
                </button>
                <button (click)="exportExcel()"
                    class="bg-green-600 text-white text-sm px-4 py-2 rounded-xl hover:bg-green-700 transition whitespace-nowrap w-full xs:w-auto">
                    Exportar Excel
                </button>
                <button (click)="exportPDF()"
                    class="bg-red-600 text-white text-sm px-4 py-2 rounded-xl hover:bg-red-700 transition whitespace-nowrap w-full xs:w-auto">
                    Exportar PDF
                </button>
            </div>
        </div>
    </div>

    <!-- Tabla -->
    <div class="mt-6 bg-white rounded-xl shadow-md overflow-x-auto">
        <div class="p-2">
            <table mat-table [dataSource]="dataSource" matSort class="w-full">
                <ng-container matColumnDef="nombre">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Nombre</th>
                    <td mat-cell *matCellDef="let u">{{ u.nombre }}</td>
                </ng-container>
                <ng-container matColumnDef="correo">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Correo</th>
                    <td mat-cell *matCellDef="let u">{{ u.correo }}</td>
                </ng-container>
                <ng-container matColumnDef="documento">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Documento</th>
                    <td mat-cell *matCellDef="let u">{{ u.documento }}</td>
                </ng-container>
                <ng-container matColumnDef="rol">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Rol</th>
                    <td mat-cell *matCellDef="let u" class="capitalize">{{ u.rol }}</td>
                </ng-container>
                <ng-container matColumnDef="estado">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Estado</th>
                    <td mat-cell *matCellDef="let u"><span [ngClass]="getStatusColor(u.estado)"
                            class="px-2 py-1 rounded-full text-xs">{{ u.estado }}</span></td>
                </ng-container>
                <ng-container matColumnDef="fecha">
                    <th mat-header-cell *matHeaderCellDef mat-sort-header>Fecha creación</th>
                    <td mat-cell *matCellDef="let u">{{ u.fecha_creacion ? (u.fecha_creacion | date: 'yyyy-MM-dd') : '-'
                        }}</td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>
            <mat-paginator [pageSize]="10" [pageSizeOptions]="[10,20,50]"></mat-paginator>
        </div>
    </div>

    <div class="mt-8 grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-white rounded-xl shadow-md p-4 lg:col-span-2">
            <div class="flex justify-between items-center mb-2">
                <h3 class="text-sm font-semibold">Usuarios por rol</h3>
                <button (click)="downloadChartPng('usersRoleChart','usuarios_rol.png')"
                    class="text-xs px-3 py-1 rounded bg-blue-600 text-white">Descargar PNG</button>
            </div>
            <div id="chart-users-role">
                <apx-chart [series]="roleSeries" [xaxis]="roleXAxis" [chart]="roleChart"></apx-chart>
            </div>
        </div>
    </div>

    <div class="mt-4 flex justify-end">
        <button (click)="exportChartsToPDF()" class="text-xs px-4 py-2 rounded bg-red-600 text-white">Exportar gráficos
            a PDF</button>
    </div>
</main>
