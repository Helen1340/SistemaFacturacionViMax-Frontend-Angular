<main class="w-full md:ml-0 p-4 flex-1 overflow-auto">

    <div class="-mt-4 mb-2">
        <h2 class="text-4xl font-semibold mb-10 mt-4">
            Reporte de Usuarios
        </h2>
    </div>

    <div class="border-b-2 border-gray-300 w-full mb-8"></div>

    <div class="bg-white rounded-xl shadow-md p-6">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 items-end">
            <div>
                <label class="text-sm font-medium text-black block mb-1">Buscar usuario</label>
                <div class="flex items-center border border-gray-300 rounded-lg px-3 py-2">
                    <svg class="w-4 h-4 text-gray-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-4.35-4.35M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16z" />
                    </svg>
                    <input type="text" placeholder="Nombre o usuario" [(ngModel)]="searchQuery"
                        class="w-full border-none outline-none text-black text-sm placeholder-gray-400" />
                </div>
            </div>

            <div>
                <label class="text-sm font-medium text-black block mb-1">Desde</label>
                <input type="date" [(ngModel)]="startDate"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black bg-white" />
            </div>

            <div>
                <label class="text-sm font-medium text-black block mb-1">Hasta</label>
                <input type="date" [(ngModel)]="endDate"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black bg-white" />
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
            <div>
                <label class="text-sm font-medium text-black block mb-1">Correo electrónico</label>
                <input type="email" placeholder="correo@ejemplo.com" [(ngModel)]="email"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black placeholder-gray-400" />
            </div>

            <div>
                <label class="text-sm font-medium text-black block mb-1">Rol</label>
                <select class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black bg-white"
                    [(ngModel)]="role">
                    <option value="">Todos</option>
                    <option>Administrador</option>
                    <option>Facturador</option>
                    <option>Revisor</option>
                    <option>Contador</option>
                </select>
            </div>

            <div>
                <label class="text-sm font-medium text-black block mb-1">Estado</label>
                <select class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black bg-white"
                    [(ngModel)]="status">
                    <option value="">Todos</option>
                    <option>Activo</option>
                    <option>Inactivo</option>
                    <option>Bloqueado</option>
                </select>
            </div>
        </div>

        <div class="flex justify-end mt-6">
            <button (click)="applyFilters()"
                class="bg-cyan-600 text-white text-sm px-6 py-2 rounded-xl hover:bg-cyan-700 transition">
                Buscar
            </button>
        </div>
    </div>

    <div class="mt-6 bg-white rounded-xl shadow-md overflow-x-auto">
        <table class="min-w-full text-sm text-left">
            <thead class="bg-gray-100 text-gray-700">
                <tr>
                    <th class="px-4 py-3">Nombre</th>
                    <th class="px-4 py-3">Usuario</th>
                    <th class="px-4 py-3">Correo</th>
                    <th class="px-4 py-3">Rol</th>
                    <th class="px-4 py-3">Estado</th>
                    <th class="px-4 py-3">Fecha de creación</th>
                    <th class="px-4 py-3 text-center">Acciones</th>
                </tr>
            </thead>
            <tbody class="text-black">
                <tr *ngFor="let user of filteredUsers" class="border-t border-gray-200">
                    <td class="px-4 py-2">{{ user.name }}</td>
                    <td class="px-4 py-2">{{ user.username }}</td>
                    <td class="px-4 py-2">{{ user.email }}</td>
                    <td class="px-4 py-2">{{ user.role }}</td>
                    <td class="px-4 py-2 font-semibold" [ngClass]="getStatusColor(user.status)">
                        {{ user.status }}
                    </td>
                    <td class="px-4 py-2">{{ user.creationDate }}</td>
                    <td class="px-4 py-2 text-center">
                        <div class="relative inline-block text-left">
                            <button (click)="toggleMenu($event)" class="p-3 rounded">
                                <svg width="19" height="19" viewBox="0 0 22 30" fill="none"
                                    xmlns="http://www.w3.org/2000/svg">
                                    <path
                                        d="M13.4136 15.0078C13.4193 13.558 12.5425 12.3793 11.4552 12.375C10.3679 12.3707 9.48184 13.5425 9.47612 14.9922C9.4704 16.4419 10.3472 17.6207 11.4345 17.625C12.5218 17.6293 13.4079 16.4575 13.4136 15.0078Z"
                                        fill="black" />
                                    <path
                                        d="M19.976 15.0337C19.9818 13.584 19.105 12.4052 18.0177 12.4009C16.9304 12.3966 16.0443 13.5684 16.0386 15.0181C16.0328 16.4679 16.9096 17.6466 17.9969 17.6509C19.0842 17.6552 19.9703 16.4834 19.976 15.0337Z"
                                        fill="black" />
                                    <path
                                        d="M6.85109 14.9819C6.85681 13.5321 5.98002 12.3534 4.89272 12.3491C3.80542 12.3448 2.91934 13.5166 2.91362 14.9663C2.9079 16.4161 3.78469 17.5948 4.87199 17.5991C5.9593 17.6034 6.84537 16.4316 6.85109 14.9819Z"
                                        fill="black" />
                                </svg>
                            </button>
                            <div
                                class="dropdown absolute right-3 mt-1 w-40 bg-white border border-gray-300 rounded-2xl shadow hidden z-10">
                                <a href="#" class="block px-4 py-2 text-sm hover:bg-blue-100"
                                    (click)="downloadReport(user, 'PDF')">Exportar PDF</a>
                                <a href="#" class="block px-4 py-2 text-sm hover:bg-blue-100"
                                    (click)="downloadReport(user, 'Excel')">Exportar Excel</a>
                            </div>
                        </div>
                    </td>
                </tr>
                <tr *ngIf="filteredUsers.length === 0">
                    <td colspan="7" class="text-center px-4 py-4 text-gray-500">
                        No se encontraron usuarios que coincidan con los filtros.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>

</main>
