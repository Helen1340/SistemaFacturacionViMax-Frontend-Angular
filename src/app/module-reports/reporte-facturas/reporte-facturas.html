<main class="w-full md:ml-0 p-4 flex-1 overflow-auto">
    <div class="-mt-4 mb-2">
        <h2 class="text-4xl font-semibold mb-10 mt-4">
            Reporte de facturas
        </h2>
    </div>

    <div class="border-b-2 border-gray-300 w-full mb-8"></div>

    <!-- 🔹 Filtros -->
    <div class="bg-white rounded-xl shadow-md p-6">
        <div class="grid grid-cols-1 md:grid-cols-5 gap-4 items-end">
            <div class="md:col-span-2">
                <label class="text-sm font-medium text-black block mb-1">Buscar factura</label>
                <div class="flex items-center border border-gray-300 rounded-lg px-3 py-1.5">
                    <svg class="w-4 h-4 text-gray-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-4.35-4.35M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16z" />
                    </svg>
                    <input type="text" placeholder="Número de factura" [(ngModel)]="invoiceNumber"
                        class="w-full border-none outline-none text-black text-sm placeholder-gray-400" />
                </div>
            </div>

            <div>
                <label class="text-sm font-medium text-black block mb-1">Estado</label>
                <select class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black bg-white"
                    [(ngModel)]="status" (change)="applyFilters()">
                    <option *ngFor="let s of statusOptions" [value]="s">{{ s }}</option>
                </select>
            </div>

            <div>
                <label class="text-sm font-medium text-black block mb-1">Desde</label>
                <input type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black"
                    [(ngModel)]="startDate" />
            </div>

            <div>
                <label class="text-sm font-medium text-black block mb-1">Hasta</label>
                <input type="date" class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black"
                    [(ngModel)]="endDate" />
            </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
            <div>
                <label class="text-sm font-medium text-black block mb-1">Cliente</label>
                <input type="text" placeholder="Nombre" [(ngModel)]="clientName"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black placeholder-gray-400" />
            </div>

            <div>
                <label class="text-sm font-medium text-black block mb-1">Responsable de emisión</label>
                <input type="text" placeholder="Usuario que emitió" [(ngModel)]="responsible"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black placeholder-gray-400" />
            </div>

            <div>
                <label class="text-sm font-medium text-black block mb-1">Tipo de documento</label>
                <select class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black bg-white"
                    [(ngModel)]="documentType" (change)="applyFilters()">
                    <option *ngFor="let d of documentOptions" [value]="d">{{ d }}</option>
                </select>
            </div>
        </div>

        <div class="flex justify-end mt-6 space-x-4">
            <button (click)="resetFilters()" class="bg-gray-400 text-white text-sm px-12 py-2 rounded-xl hover:bg-gray-600 transition mr-3">
                Limpiar filtros
            </button>
            <button (click)="applyFilters()"
                class="bg-cyan-600 text-white text-sm px-12 py-2 rounded-xl hover:bg-cyan-700 transition mr-3">
                Buscar
            </button>
            <button (click)="exportExcel()"
                class="bg-green-600 text-white text-sm px-12 py-2 rounded-xl hover:bg-green-700 transition mr-3">
                Exportar Excel
            </button>
            <button (click)="exportPDF()"
                class="bg-red-600 text-white text-sm px-12 py-2 rounded-xl hover:bg-red-700 transition mr-3">
                Exportar PDF
            </button>
        </div>
    </div>

    <!-- 🔹 Tabla -->
    <div class="mt-6 bg-white rounded-2xl shadow overflow-hidden">
        <div
            class="overflow-x-auto overflow-y-auto max-h-[400px] relative scrollbar-thin scrollbar-thumb-gray-400 scrollbar-track-gray-200">
            <table class="min-w-full text-sm text-left">
                <thead class="bg-gray-100 text-gray-800">
                    <tr>
                        <th class="px-4 py-3">Fecha</th>
                        <th class="px-4 py-3">Tipo de documento</th>
                        <th class="px-4 py-3">Factura / Número</th>
                        <th class="px-4 py-3">Cliente</th>
                        <th class="px-4 py-3">NIT</th>
                        <th class="px-4 py-3">Responsable</th>
                        <th class="px-4 py-3">Valor total</th>
                        <th class="px-4 py-3">Estado</th>
                    </tr>
                </thead>
                <tbody class="text-black">
                    <tr *ngFor="let invoice of filteredInvoices" class="border-t border-gray-200">
                        <td class="px-4 py-2">{{ invoice.date }}</td>
                        <td class="px-4 py-2">{{ invoice.documentType }}</td>
                        <td class="px-4 py-2">{{ invoice.invoiceNumber }}</td>
                        <td class="px-4 py-2">{{ invoice.client }}</td>
                        <td class="px-4 py-2">{{ invoice.nit }}</td>
                        <td class="px-4 py-2">{{ invoice.responsible }}</td>
                        <td class="px-4 py-2">{{ invoice.totalValue }}</td>
                        <td class="px-4 py-2" [ngClass]="{
                        'text-green-600': invoice.status === 'Aceptada',
                        'text-yellow-600': invoice.status === 'Pendiente' || invoice.status === 'Emitida',
                        'text-red-600': invoice.status === 'Rechazada'
            }">
                            {{ invoice.status }}
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>
</main>
