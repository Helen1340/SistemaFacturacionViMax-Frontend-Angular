<main class="w-full md:ml-0 p-4 flex-1 overflow-auto">


    <div class="-mt-4 mb-2">
        <h2 class="text-4xl font-semibold mb-10 mt-4">
            Reporte de impuestos
        </h2>
    </div>

    <div class="border-b-2 border-gray-300 w-full mb-8"></div>

    <!-- CONTENEDOR PRINCIPAL -->
    <div class="bg-white rounded-xl shadow-md p-6">
        <!-- FILTROS FILA 1 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
            <!-- Buscador por cliente -->
            <div>
                <label class="text-sm font-medium text-black block mb-1">Buscar cliente</label>
                <div class="flex items-center border border-gray-300 rounded-lg px-3 py-1.5">
                    <svg class="w-4 h-4 text-gray-500 mr-2" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M21 21l-4.35-4.35M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16z" />
                    </svg>
                    <input type="text" placeholder="Nombre o NIT"
                        class="w-full border-none outline-none text-black text-sm placeholder-gray-400" />
                </div>
            </div>

            <!-- Fecha desde -->
            <div>
                <label class="text-sm font-medium text-black block mb-1">Desde</label>
                <input type="date"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black bg-white" />
            </div>

            <!-- Fecha hasta -->
            <div>
                <label class="text-sm font-medium text-black block mb-1">Hasta</label>
                <input type="date"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black bg-white" />
            </div>
        </div>

        <!-- FILTROS FILA 2 -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mt-4">
            <!-- Tipo de impuesto -->
            <div>
                <label class="text-sm font-medium text-black block mb-1">Tipo de impuesto</label>
                <select class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black bg-white">
                    <option value="">Todos</option>
                    <option value="IVA">IVA</option>
                    <option value="ICA">ICA</option>
                    <option value="Retefuente">Retefuente</option>
                    <option value="Exento">Exento</option>
                    <option value="Excluido">Excluido</option>
                </select>
            </div>

            <!-- Tipo de documento -->
            <div>
                <label class="text-sm font-medium text-black block mb-1">Tipo de documento</label>
                <select class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black bg-white">
                    <option value="">Todos</option>
                    <option value="factura">Factura electrónica</option>
                    <option value="nota_credito">Nota Crédito</option>
                    <option value="nota_debito">Nota Débito</option>
                </select>
            </div>

            <!-- Responsable -->
            <div>
                <label class="text-sm font-medium text-black block mb-1">Responsable de emisión</label>
                <input type="text" placeholder="Usuario que emitió"
                    class="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm text-black bg-white placeholder-gray-400" />
            </div>
        </div>

        <!-- BOTÓN BUSCAR -->
        <div class="flex justify-end mt-6">
            <button class="bg-cyan-600 text-white text-sm px-6 py-2 rounded-xl hover:bg-cyan-700 transition">
                Buscar
            </button>
        </div>
    </div>

    <!-- TABLA DE RESULTADOS -->
    <div class="mt-6 bg-white rounded-xl shadow-md overflow-x-auto">
        <table class="min-w-full text-sm text-left">
            <thead class="bg-gray-100 text-gray-700">
                <tr>
                    <th class="px-4 py-3">Fecha</th>
                    <th class="px-4 py-3">Tipo de documento</th>
                    <th class="px-4 py-3">N° Documento</th>
                    <th class="px-4 py-3">Cliente</th>
                    <th class="px-4 py-3">NIT</th>
                    <th class="px-4 py-3">Impuesto</th>
                    <th class="px-4 py-3">Valor</th>
                    <th class="px-4 py-3">Responsable</th>
                    <th class="px-4 py-3 text-center">Acciones</th>
                </tr>
            </thead>
            <tbody class="text-black">
                <tr class="border-t">
                    <td class="px-4 py-2">2025-07-05</td>
                    <td class="px-4 py-2">Factura electrónica</td>
                    <td class="px-4 py-2">FV-00123</td>
                    <td class="px-4 py-2">Comercial XYZ S.A.S</td>
                    <td class="px-4 py-2">900123456-7</td>
                    <td class="px-4 py-2">IVA</td>
                    <td class="px-4 py-2">$85.000</td>
                    <td class="px-4 py-2">admin_vimax</td>
                    <td class="px-4 py-2 text-center">
                        <!-- Botón para desplegar los tres puntos -->
                        <button onclick="toggleMenu(this)" class="p-3 rounded">
                            <svg width="19" height="19" viewBox="0 0 22 30" fill="none"
                                xmlns="http://www.w3.org/2000/svg">
                                <path
                                    d="M13.4136 15.0078C13.4193 13.558 12.5425 12.3793 11.4552 12.375C10.3679 12.3707 9.48184 13.5425 9.47612 14.9922C9.4704 16.4419 10.3472 17.6207 11.4345 17.625C12.5218 17.6293 13.4079 16.4575 13.4136 15.0078Z"
                                    fill="black" />
                                <path
                                    d="M19.976 15.0337C19.9818 13.584 19.105 12.4052 18.0177 12.4009C16.9304 12.3966 16.0443 13.5684 16.0386 15.0181C16.0328 16.4679 16.9096 17.6466 17.9969 17.6509C19.0842 17.6552 19.9703 16.4834 19.976 15.0337Z"
                                    fill="black" />
                                <path
                                    d="M6.85109 14.9819C6.85681 13.5321 5.98002 12.3534 4.89272 12.3491C3.80542 12.3448 2.91934 13.5166 2.91362 14.9663C2.9079 16.4161 3.78469 17.5948 4.87199 17.5991C5.9593 17.6034 6.84537 16.4316 6.85109 14.9819Z"
                                    fill="black" />
                            </svg>
                        </button>
                        <!-- Menú Desplegable de los tres puntos -->
                        <div
                            class="dropdown absolute right-3 mt-1 w-40 bg-white border border-gray-300 rounded-2xl shadow hidden z-10">
                            <a href="#" class="block px-4 py-2 text-sm hover:bg-blue-100">Ver Detalles</a>
                            <a href="#" class="block px-4 py-2 text-sm hover:bg-blue-100">Exportar PDF</a>
                            <a href="#" class="block px-4 py-2 text-sm hover:bg-blue-100">Exportar Excel</a>
                        </div>
                    </td>
                </tr>
            </tbody>
    </table>
    </div>

</main>
