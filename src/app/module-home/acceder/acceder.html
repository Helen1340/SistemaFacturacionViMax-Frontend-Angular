<body class="min-h-screen bg-gray-100 flex flex-col items-center justify-center p-4 relative">
    
    <!-- Logo -->
    <div class="flex flex-col items-center mt-8 mb-4">
        <img src="/logo vimax 2.png" alt="Logo VIMAX"
            class="w-32 h-32 object-contain mb-2" />
        <h1 class="text-3xl md:text-4xl font-bold text-cyan-600 mb-0 leading-tight">FACTURACIÓN</h1>
        <h1 class="text-2xl md:text-3xl font-bold text-cyan-600 mt-1">VIMAX</h1>
    </div>

    <!-- Subtítulo -->
    <h3 class="text-lg text-gray-700 text-center mb-6">Ingresa a tu cuenta</h3>

    <!-- Formulario -->
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-4 w-full max-w-xs mx-auto flex flex-col items-center">
        <!-- Campo de correo electrónico -->
        <div class="w-full">
            <label for="email" class="block text-xs font-medium text-gray-600 mb-1">
                Correo electronico
            </label>
            <input type="email" id="email" formControlName="email" placeholder="Ingresa tu correo electrónico"
                class="w-full px-4 py-2 bg-gray-200 border-0 rounded-lg focus:outline-none focus:ring-2 text-sm placeholder-gray-400"
                [class.border-red-500]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
                style="--tw-ring-color: #0799B6;" />
            <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
                class="text-red-500 text-xs mt-1">
                <span *ngIf="loginForm.get('email')?.errors?.['required']">El correo es requerido</span>
                <span *ngIf="loginForm.get('email')?.errors?.['email']">Ingresa un correo válido</span>
            </div>
        </div>

        <!-- Campo de contraseña -->
        <div class="w-full">
            <div class="flex justify-between items-center mb-1">
                <label for="password" class="block text-xs font-medium text-gray-600">
                    Contraseña
                </label>
                <button type="button" id="forgotPassword"
                    class="text-cyan-600 hover:text-cyan-700 text-xs transition-colors">
                    ¿Olvidaste tu contraseña?
                </button>
            </div>
            <div class="relative">
                <input [type]="showPassword ? 'text' : 'password'" id="password" formControlName="password" 
                    placeholder="Escribe tu contraseña"
                    class="w-full px-4 py-2 bg-gray-200 border-0 rounded-lg focus:outline-none focus:ring-2 text-sm pr-10 placeholder-gray-400"
                    [class.border-red-500]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                    style="--tw-ring-color: #0799B6;" />
                <button type="button" (click)="togglePasswordVisibility()"
                    class="absolute right-3 top-1/2 transform -translate-y-1/2 text-gray-500 hover:text-gray-700 transition-colors">
                    <svg *ngIf="!showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                        <circle cx="12" cy="12" r="3" />
                    </svg>
                    <svg *ngIf="showPassword" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
                        stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path
                            d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                        <line x1="1" y1="1" x2="23" y2="23" />
                    </svg>
                </button>
            </div>
            <div *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
                class="text-red-500 text-xs mt-1">
                <span *ngIf="loginForm.get('password')?.errors?.['required']">La contraseña es requerida</span>
                <span *ngIf="loginForm.get('password')?.errors?.['minlength']">La contraseña debe tener al menos 6 caracteres</span>
            </div>
        </div>

        <!-- Botón de ingresar -->
        <button type="submit" [disabled]="loginForm.invalid || isLoading"
            class="w-full text-white font-semibold py-2 rounded-lg transition-colors duration-200 text-base mt-2 block text-center disabled:opacity-50 disabled:cursor-not-allowed"
            style="background-color: #0799B6;">
            <span *ngIf="!isLoading">Ingresar</span>
            <span *ngIf="isLoading">Iniciando sesión...</span>
        </button>
    </form>

    <!-- Enlace para registro -->
    <div class="text-center mt-6">
        <p class="text-gray-600 text-sm">
            ¿No tienes una cuenta?
            <button (click)="navigateToRegister()" 
                class="text-cyan-600 hover:text-cyan-700 transition-colors font-medium">
                Regístrate aquí
            </button>
        </p>
    </div>

    <!-- Mensaje de notificación -->
    <div *ngIf="notification.show"
        class="fixed top-4 left-1/2 transform -translate-x-1/2 px-6 py-3 rounded-lg shadow-lg transition-all duration-300"
        [class.bg-green-500]="notification.type === 'success'" 
        [class.bg-red-500]="notification.type === 'error'"
        [class.text-white]="true">
        <span>{{ notification.message }}</span>
    </div>

</body>
