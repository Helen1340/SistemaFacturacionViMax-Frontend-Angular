



    <!-- Contenido principal -->
    <main class="w-full md:ml-0 p-4 flex-1 overflow-auto">
        <!-- Contenido de la página -->
        <div class="-mt-4 mb-2">
            <h2 class="text-4xl font-semibold mb-6 mt-8">
                Recepción de documentos
            </h2>
        </div>
        <!-- Línea divisoria -->
        <div class="border-b-2 border-gray-300 w-full mb-8 mt-0"></div>

        <!-- Filtros y búsqueda -->
        <div class="mb-8 p-4 rounded-xl shadow-lg flex flex-col md:flex-row md:items-end gap-4">
            <div class="flex-1">
                <label class="block text-sm font-medium mb-1">Buscar</label>
                <div class="relative">
                    <span class="absolute left-3 top-2.5 text-gray-400">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                            <circle cx="11" cy="11" r="8" />
                            <path d="M21 21l-4.35-4.35" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </span>
                    <input type="text" placeholder="Buscar .."
                        class="w-full border rounded-xl pl-10 pr-3 py-2 text-base" />
                </div>
            </div>
            <div class="flex-1">
                <label class="block text-sm font-medium mb-1">Filtro</label>
                <select class="w-full border rounded-xl px-4 py-2 text-base">
                    <option>Todos</option>
                    <option>Cliente</option>
                    <option>Estado DIAN</option>
                    <option>N° Documento</option>
                </select>
            </div>
            <div class="flex-1">
                <label class="block text-sm font-medium mb-1">Desde</label>
                <input type="date" class="w-full border rounded-xl px-3 py-2 text-base" />
            </div>
            <div class="flex-1">
                <label class="block text-sm font-medium mb-1">hasta</label>
                <input type="date" class="w-full border rounded-xl px-3 py-2 text-base" />
            </div>
        </div>

        <!-- Tabla de documentos recibidos -->
        <div class="bg-white rounded-2xl shadow overflow-x-auto">
            <table class="min-w-full">
                <thead class="bg-gray-100 text-gray-800 text-left">
                    <tr>
                        <th class="px-4 py-2 text-sm">Tipo de documento</th>
                        <th class="px-4 py-2 text-sm">N° Documento</th>
                        <th class="px-4 py-2 text-sm">Cliente</th>
                        <th class="px-4 py-2 text-sm">Fecha emisión</th>
                        <th class="px-4 py-2 text-sm">Estado DIAN</th>
                        <th class="px-4 py-2 text-sm">Modo</th>
                        <th class="px-4 py-2 text-center text-sm">Acciones</th>
                    </tr>
                </thead>
                <tbody class="bg-white divide-y divide-gray-200">
                    <tr class="border-t border-t-gray-200">
                        <td class="px-4 py-6"></td>
                        <td class="px-4 py-6"></td>
                        <td class="px-4 py-6"></td>
                        <td class="px-4 py-6"></td>
                        <td class="px-4 py-6"></td>
                        <td class="px-4 py-6"></td>
                        <td class="px-4 py-6 text-center"></td>
                    </tr>
                </tbody>
            </table>
        </div>

    </main>
