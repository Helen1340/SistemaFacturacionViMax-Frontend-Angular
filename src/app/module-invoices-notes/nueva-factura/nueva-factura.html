<!-- Overlay para móvil -->
<div id="overlay" class="hidden fixed inset-0 bg-black/50 z-40 md:hidden"></div>

<main class="w-full p-4 flex-1">
  <!-- Alertas personalizadas -->
  <div *ngIf="showAlert" class="fixed top-20 right-4 px-6 py-4 rounded-lg shadow-lg z-50 animate-fade-in"
       [ngClass]="{
         'bg-green-50 border border-green-200 text-green-800': alertType === 'success',
         'bg-blue-50 border border-blue-200 text-blue-800': alertType === 'info',
         'bg-yellow-50 border border-yellow-200 text-yellow-800': alertType === 'warning',
         'bg-red-50 border border-red-200 text-red-800': alertType === 'error'
       }">
    <div class="flex items-center space-x-3">
      <span class="font-medium">{{ alertMessage }}</span>
    </div>
  </div>

  <div class="sticky top-0 bg-white z-10 pb-4 mt-6">
    <h2 class="text-3xl sm:text-4xl font-semibold mb-4 mt-2">Nueva Factura</h2>
    <div class="border-b-2 border-gray-300 w-full"></div>
  </div>

  <!-- CONTENEDOR DEL FORMULARIO -->
  <div class="max-w-10xl mx-auto sm:px-6 lg:px-8">
    <div class="bg-white rounded-lg shadow-xl p-4 sm:p-6 lg:p-8 
        max-h-[75vh] overflow-y-auto overflow-x-hidden scrollbar-thin scrollbar-thumb-gray-400 scrollbar-track-gray-200 space-y-8 text-sm sm:text-base">
      <!-- Datos del cliente -->
      <section>
        <h3 class="text-lg font-semibold mb-4">Datos del cliente</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
          <div>
            <label class="block text-sm font-medium text-black mb-2">Nombre / Razón social <span class="text-red-500">*</span></label>
            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" />
          </div>
          <div class="relative w-full min-w-0">
            <label class="block text-sm font-medium text-black mb-2">Tipo de documento <span class="text-red-500">*</span></label>
            <select class="appearance-none border border-gray-300 rounded-md px-4 py-2 text-gray-700 pr-10 w-full text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
              <option value="13" class="text-sm">Cédula de Ciudadanía</option>
              <option value="31" class="text-sm">NIT</option>
              <option value="12" class="text-sm">Tarjeta de Identidad</option>
              <option value="22" class="text-sm">Cédula de Extranjería</option>
              <option value="41" class="text-sm">Pasaporte</option>
              <option value="42" class="text-sm">Documento Extranjero</option>
            </select>
            <div class="pointer-events-none absolute top-[36px] right-3 flex items-center text-gray-700">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-black mb-2">No. documento <span class="text-red-500">*</span></label>
            <input type="text" name="documento" pattern="\d{5,15}" class="peer w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 invalid:border-red-500" />
            <p class="mt-1 text-xs text-red-500 hidden peer-invalid:block">Ingrese un número válido (solo dígitos, 5 a 15 caracteres).</p>
          </div>
          <div class="relative w-full min-w-0">
            <label class="block text-sm font-medium text-black mb-2">Tipo de Persona <span class="text-red-500">*</span></label>
            <select class="appearance-none border border-gray-300 rounded-md px-4 py-2 text-gray-700 pr-10 w-full text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
              <option value="natural" class="text-sm">Persona Natural</option>
              <option value="jurídica" class="text-sm">Persona Jurídica</option>
            </select>
            <div class="pointer-events-none absolute top-[36px] right-3 flex items-center text-gray-700">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-black mb-2">Correo electrónico <span class="text-red-500">*</span></label>
            <input type="email" class="peer w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500 invalid:border-red-500" />
            <p class="mt-1 text-xs text-red-500 hidden peer-invalid:block">Por favor ingrese un correo válido.</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-black mb-2">País <span class="text-red-500">*</span></label>
            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-black mb-2">Dirección <span class="text-red-500">*</span></label>
            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-black mb-2">Teléfono</label>
            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" />
          </div>
          <div class="relative w-full min-w-0">
            <label class="block text-sm font-medium text-black mb-2">Régimen del cliente</label>
            <select class="appearance-none border border-gray-300 rounded-md px-4 py-2 text-gray-700 pr-10 w-full text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
              <option value="48" class="text-sm">Responsable de IVA</option>
              <option value="49" class="text-sm">No responsable de IVA (Régimen Simple)</option>
              <option value="47" class="text-sm">Régimen Especial</option>
              <option value="50" class="text-sm">Gran contribuyente</option>
              <option value="51" class="text-sm">Exento</option>
            </select>
            <div class="pointer-events-none absolute top-[36px] right-3 flex items-center text-gray-700">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </div>
        </div>
      </section>

      <!-- Datos de la factura -->
      <section>
        <h3 class="text-lg font-semibold mb-4">Datos de la factura</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
          <div>
            <label class="block text-sm font-medium text-black mb-2">Fecha de emisión <span class="text-red-500">*</span></label>
            <input type="date" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-black mb-2">Hora de emisión <span class="text-red-500">*</span></label>
            <input type="time" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" />
          </div>
          
          <div class="relative w-full min-w-0">
            <label class="block text-sm font-medium text-black mb-2">Medio de pago <span class="text-red-500">*</span></label>
            <select class="appearance-none border border-gray-300 rounded-md px-4 py-2 text-gray-700 pr-10 w-full cursor-pointer text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
              <option value="1" class="text-sm">Contado</option>
              <option value="2" class="text-sm">Crédito</option>
            </select>
            <div class="pointer-events-none absolute top-[36px] right-3 flex items-center text-gray-700">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </div>
          <div class="relative w-full min-w-0">
            <label class="block text-sm font-medium text-black mb-2">Forma de pago <span class="text-red-500">*</span></label>
            <select class="appearance-none border border-gray-300 rounded-md px-4 py-2 text-gray-700 pr-10 w-full cursor-pointer text-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500">
              <option value="10" class="text-sm">Efectivo</option>
              <option value="30" class="text-sm">Transferencia bancaria</option>
              <option value="48" class="text-sm">Tarjeta crédito</option>
              <option value="49" class="text-sm">Tarjeta débito</option>
              <!-- <option value="pse">PSE</option> -->
              <option value="ZZ" class="text-sm">Otros</option>
            </select>
            <div class="pointer-events-none absolute top-[36px] right-3 flex items-center text-gray-700">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
              </svg>
            </div>
          </div>
          <div>
            <label class="block text-sm font-medium text-black mb-2">Observaciones</label>
            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" />
          </div>
        </div>
      </section>

      <!-- Detalle productos o servicios -->
      <section>
        <h3 class="text-lg font-semibold mb-4">Detalle de productos o servicios</h3>
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4 sm:gap-6">
          <div>
            <label class="block text-sm font-medium text-black mb-2">Código del producto / servicio <span class="text-red-500">*</span></label>
            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-black mb-2">Descripción <span class="text-red-500">*</span></label>
            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-black mb-2">Unidad de medida <span class="text-red-500">*</span></label>
            <input type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-black mb-2">Cantidad <span class="text-red-500">*</span></label>
            <input type="number" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-black mb-2">Valor unitario <span class="text-red-500">*</span></label>
            <input type="number" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" />
          </div>
          
          <div>
            <label class="block text-sm font-medium text-black mb-2">¿Exento? <span class="text-red-500">*</span></label>
            <div class="flex gap-6 mt-1">
              <label class="flex items-center text-sm"><input type="radio" name="exento" class="h-4 w-4 mr-2 text-teal-600 focus:ring-teal-500 border-gray-300 cursor-pointer">SI</label>
              <label class="flex items-center text-sm"><input type="radio" name="exento" class="h-4 w-4 mr-2 text-teal-600 focus:ring-teal-500 border-gray-300 cursor-pointer">NO</label>
            </div>
          </div>
          <div><label class="block text-sm">Total</label>
            <p>$0.00</p>
          </div>
          <div class="flex flex-wrap mt-4 justify-end">
            <button class="bg-cyan-600 hover:bg-cyan-700 text-white px-4 py-2 rounded-md w-full sm:w-auto text-sm">+ Agregar item</button>
          </div>
        </div>
      </section>

      <!-- Resumen contable e impuestos -->
      <section>
        <h3 class="text-lg font-semibold mb-4">Resumen contable e impuestos</h3>
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          <div>
            <label class="block text-sm font-medium text-black mb-1">Subtotal antes de impuestos:</label>
            <p class="text-sm">$0.00</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-black mb-1">Total impuestos:</label>
            <p class="text-sm">$0.00</p>
          </div>
          <div>
            <label class="block text-sm font-medium text-black mb-2">Descuento:</label>
            <input type="text" class="w-full px-3 py-2 border rounded-md shadow-sm focus:outline-none focus:ring-2 focus:ring-teal-500 focus:border-teal-500" />
          </div>
          <div>
            <label class="block text-sm font-medium text-black mb-1">Valor total a pagar:</label>
            <p class="text-sm">$0.00</p>
          </div>
        </div>
      </section>

      <!-- Botones -->
    <div class="pt-2 flex flex-wrap gap-4 justify-end">
      <button (click)="emitirFactura()" class="bg-cyan-600 hover:bg-cyan-700 text-white font-medium py-2 px-6 rounded-md shadow-sm text-sm">Emitir factura electrónica</button>
      <button (click)="validarFactura()" class="bg-cyan-600 hover:bg-cyan-700 text-white font-medium py-2 px-6 rounded-md shadow-sm text-sm">Validar</button>
      <button type="button" (click)="cancelar()" class="bg-gray-200 hover:bg-gray-300 text-black font-medium py-2 px-6 rounded-md shadow-sm text-sm">Cancelar</button>
      <button (click)="guardarComoBorrador()" class="bg-gray-200 hover:bg-gray-300 text-black font-medium py-2 px-6 rounded-md shadow-sm text-sm">Guardar como Borrador</button>
    </div>

    </div>
  </div>
</main>
