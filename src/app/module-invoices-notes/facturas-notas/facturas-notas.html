<!-- Contenido de la página -->
 
<div class="-mt-0 mb-4">
    <h2 class="text-4xl font-semibold mb-10 mt-4">
        Facturación
    </h2>
</div>
<!-- Línea divisoria -->
<div class="border-b-2 border-gray-300 w-full  mb-8"></div>

<!-- Botón para crear nuevo documento -->
<div class="relative flex justify-end mb-4">
    <div class="relative">
        <button (click)="toggleDropdown()" class="bg-cyan-600 hover:bg-cyan-700 text-white px-4 py-2 rounded-2xl flex items-center">
            <span class="mr-2 text-xl">+</span> Nuevo Documento
            <svg class="ml-2 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
        </button>
        <div *ngIf="isDropdownOpen" class="absolute right-0 mt-2 w-56 bg-white border border-gray-300 rounded-2xl shadow-lg z-50">
            <a routerLink="/nueva-factura" class="block px-4 py-2 text-sm text-gray-800 hover:bg-blue-100 rounded-t-2xl">Crear Factura</a>
            <a routerLink="/nueva-nota" class="block px-4 py-2 text-sm text-gray-800 hover:bg-blue-100 rounded-b-2xl">Crear Nota Crédito/Débito</a>
        </div>
    </div>
</div>
<!-- CONTENEDOR DEL FILTRO + BUSCADOR -->
           <div class="bg-white p-6 rounded-2xl shadow mb-6 flex flex-row items-center justify-between gap-4 w-full mx-auto">

    <div class="flex items-center border border-gray-300 rounded-lg px-4 py-2 flex-grow">
        <svg class="w-5 h-5 text-gray-500 mr-2" fill="none" stroke="currentColor" stroke-width="2"
            viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M21 21l-4.35-4.35M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16z" />
        </svg>
        <input type="text" placeholder="Buscar..."
            class="w-full border-none outline-none text-gray-700 text-sm" />
    </div>
<!-- FILTRO -->
    <div class="flex items-center space-x-2 w-1/3 sm:w-1/4 md:w-1/5">
        <label class="text-base font-semibold text-gray-900 whitespace-nowrap">Filtro</label>
        <div class="relative w-full">
            <select
                class="appearance-none border border-gray-300 rounded-lg px-4 py-2 text-gray-700 pr-10 w-full">
                <option value="">Todos</option>
                <option value="numero">No. Factura</option>
                <option value="nombre">Nombre del Cliente</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-gray-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                </svg>
            </div>
        </div>
    </div>
</div>

<!-- Tabla de productos/servicios -->
            <div class="bg-white rounded-2xl shadow overflow-x-auto">

                        <tr>
                            <th class="px-4 py-2 text-sm">No. Factura</th>
                            <th class="px-4 py-2 text-sm">Cliente</th>
                            <th class="px-4 py-2 text-sm">Total</th>
                            <th class="px-4 py-2 text-sm">Notas</th>
                            <th class="px-4 py-2 text-sm">DIAN</th>
                            <th class="px-4 py-2 text-sm">Email</th>
                            <th class="px-4 py-2 text-sm">Alerte</th>
                            <th class="px-4 py-2 text-center text-sm">Acciones</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Varias filas vacías -->
                        <tr class="border-t border-t-gray-200">
                            <td class="px-4 py-2"></td>
                            <td class="px-4 py-2"></td>
                            <td class="px-4 py-2"></td>
                            <td class="px-4 py-2"></td>
                            <td class="px-4 py-2"></td>
                            <td class="px-4 py-2"></td>
                            <td class="px-4 py-2 text-green-700 font-medium"></td>
                            <td class="px-4 py-2 text-center">

                                <button onclick="toggleMenu(this)" class="p-3 rounded">

                                        <path

                                            fill="black" />
                                        <path
                                            d="M19.976 15.0337C19.9818 13.584 19.105 12.4052 18.0177 12.4009C16.9304 12.3966 16.0443 13.5684 16.0386 15.0181C16.0328 16.4679 16.9096 17.6466 17.9969 17.6509C19.0842 17.6552 19.9703 16.4834 19.976 15.0337Z"

                                            d="M6.85109 14.9819C6.85681 13.5321 5.98002 12.3534 4.89272 12.3491C3.80542 12.3448 2.91934 13.5166 2.91362 14.9663C2.9079 16.4161 3.78469 17.5948 4.87199 17.5991C5.9593 17.6034 6.84537 16.4316 6.85109 14.9819Z"
                                            fill="black" />

                                </button>
                                <!-- Menú Desplegable de los tres puntos -->
                                <div
                                    class="dropdown absolute right-3 mt-1 w-40 bg-white border border-gray-300 rounded-2xl shadow hidden z-10">
                                    <a href="04-VerFactura.html" class="block px-4 py-2 text-sm hover:bg-blue-100">Ver Detalles</a>
                                    <a href="05-editarFactura.html" class="block px-4 py-2 text-sm hover:bg-blue-100">Editar</a>
                                    <a href="#" class="block px-4 py-2 text-sm hover:bg-blue-100">Eliminar</a>
                                </div>
                            </td>
                        </tr>

                        <!-- Más filas vacías si quieres -->
                    </tbody>
                </table>
            </div>
