<!-- Contenido principal -->
<main class="w-full py-4 flex-1 overflow-y-auto overflow-x-visible">

  <div class="-mt-4 mb-4">
    <h2 class="text-4xl font-semibold mb-6 mt-8">Historial técnico de notificaciones</h2>
  </div>

  <div class="border-b-2 border-gray-300 w-full mb-8"></div>

  <!-- Filtros y Búsqueda -->
  <div class="bg-white rounded-2xl shadow-lg border border-gray-200 p-6 mb-6">
    <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
      <!-- Buscar -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Buscar</label>
        <div class="relative">
          <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
            <svg class="h-5 w-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                  d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
            </svg>
          </div>
          <input type="text" [(ngModel)]="searchTerm" (input)="onSearch()"
                 class="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-cyan-500 focus:border-cyan-500"
                 placeholder="Buscar ..">
        </div>
      </div>

      <!-- Filtrar por -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Filtrar por</label>
        <select [(ngModel)]="filterValue" (change)="onFilter()"
                class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500">
          <option value="">ID</option>
          <option value="tipo">Tipo</option>
          <option value="modulo">Módulo Afectado</option>
          <option value="usuario">Usuario Afectado</option>
        </select>
      </div>

      <!-- Desde -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Desde</label>
        <input type="date" [(ngModel)]="fechaDesde" name="fechaDesde"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500">
      </div>

      <!-- Hasta -->
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-2">Hasta</label>
        <input type="date" [(ngModel)]="fechaHasta" name="fechaHasta"
               class="w-full border border-gray-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-cyan-500">
      </div>
    </div>
  </div>

  <!-- Tabla de Historial Técnico -->
  <div class="bg-white rounded-2xl shadow-lg border border-gray-200">
    <div class="overflow-x-auto">
      <table class="w-full table-auto">
        <thead class="bg-gray-100 text-black text-left sticky top-0 z-10">
          <tr>
            <th class="px-4 py-3 font-semibold min-w-[80px] rounded-tl-2xl">ID</th>
            <th class="px-4 py-3 font-semibold min-w-[150px]">Fecha / Hora</th>
            <th class="px-4 py-3 font-semibold min-w-[120px]">Tipo</th>
            <th class="px-4 py-3 font-semibold min-w-[150px]">Modulo Afectado</th>
            <th class="px-4 py-3 font-semibold min-w-[200px]">Mensaje</th>
            <th class="px-4 py-3 font-semibold min-w-[120px] rounded-tr-2xl">Usuario afectado</th>
          </tr>
        </thead>
        <tbody>
          <tr class="border-t border-gray-200 hover:bg-gray-50">
            <td class="px-4 py-3 text-gray-400 text-sm">-</td>
            <td class="px-4 py-3 text-gray-400 text-sm">-</td>
            <td class="px-4 py-3 text-gray-400 text-sm">-</td>
            <td class="px-4 py-3 text-gray-400 text-sm">-</td>
            <td class="px-4 py-3 text-gray-400 text-sm">-</td>
            <td class="px-4 py-3 text-gray-400 text-sm">-</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

</main>
