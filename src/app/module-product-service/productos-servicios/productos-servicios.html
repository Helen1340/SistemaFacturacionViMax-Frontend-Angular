<div class="-mt-4 mb-2">
    <h2 class="text-4xl font-semibold mb-10 mt-8">
        Productos / Servicios
    </h2>
</div>

<div class="border-b-2 border-gray-300 w-full mb-8"></div>
<router-outlet></router-outlet>

<!-- Botón para crear nuevo producto -->
<div class="relative flex justify-end mb-4">
    <div class="relative">
        <button (click)="toggleDropdown()"
            class="bg-cyan-600 hover:bg-cyan-700 text-white px-4 py-2 rounded-2xl flex items-center">
            <span class="mr-2 text-xl">+</span> Registrar
            <svg class="ml-2 w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
            </svg>
        </button>
        <div *ngIf="isDropdownOpen"
            class="absolute right-0 mt-2 w-56 bg-white border border-gray-300 rounded-2xl shadow-lg z-50">
            <a routerLink="/registrar-producto"
                class="block px-4 py-2 text-sm text-gray-800 hover:bg-blue-100 rounded-t-2xl">Productos</a>
            <a routerLink="/registrar-servicio"
                class="block px-4 py-2 text-sm text-gray-800 hover:bg-blue-100 rounded-b-2xl">Servicios</a>
        </div>
    </div>
</div>

<!-- CONTENEDOR DEL FILTRO + BUSCADOR -->
<div class="bg-white p-6 rounded-2xl shadow mb-6 flex flex-row items-center justify-between gap-4 w-full mx-auto">

    <div class="flex items-center border border-gray-300 rounded-lg px-4 py-2 flex-grow">
        <svg class="w-5 h-5 text-gray-500 mr-2" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round"
                d="M21 21l-4.35-4.35M10 18a8 8 0 1 1 0-16 8 8 0 0 1 0 16z" />
        </svg>
        <input type="text" placeholder="Buscar..." class="w-full border-none outline-none text-gray-700 text-sm" />
    </div>
    <!-- FILTRO -->
    <div class="flex items-center space-x-2 w-1/3 sm:w-1/4 md:w-1/5">
        <label class="text-base font-semibold text-gray-900 whitespace-nowrap">Filtro</label>
        <div class="relative w-full">
            <select class="appearance-none border border-gray-300 rounded-lg px-4 py-2 text-gray-700 pr-10 w-full">
                <option value="">Todos</option>
                <option value="nombre">Nombre</option>
                <option value="impuesto">Referencia</option>
                <option value="tipo">Estado Activo</option>
                <option value="estado">Estado Inactivo</option>
                <option value="facturable">Facturable</option>
                <option value="categoria">No Facturable</option>
            </select>
            <div class="pointer-events-none absolute inset-y-0 right-3 flex items-center text-gray-700">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7" />
                </svg>
            </div>
        </div>
    </div>
</div>
<!-- SEPARADO: CONTENEDOR DE LA TABLA -->
<div class="bg-white rounded-2xl shadow overflow-x-auto">
    <table class="min-w-full">
        <thead class="bg-gray-100 text-gray-800 text-left">
            <tr>
                <th class="px-4 py-2">Referencia</th>
                <th class="px-4 py-2">Nombre</th>
                <th class="px-4 py-2">Tipo</th>
                <th class="px-4 py-2">Cantidad</th>
                <th class="px-4 py-2">Impuesto</th>
                <th class="px-4 py-2">Precio</th>
                <th class="px-4 py-2">Estado</th>
                <th class="px-4 py-2 text-center">Acciones</th>
            </tr>
        </thead>
        <tbody>
            <!-- Varias filas vacías -->
            <tr class="border-t">
                <td class="px-4 py-2"></td>
                <td class="px-4 py-2"></td>
                <td class="px-4 py-2"></td>
                <td class="px-4 py-2"></td>
                <td class="px-4 py-2"></td>
                <td class="px-4 py-2"></td>
                <td class="px-4 py-2 text-green-700 font-medium"></td>
                <td class="px-4 py-2 text-center">
                    <!-- Boton -->
                    <button onclick="toggleMenu(this)" class="p-3 rounded">
                        <svg width="19" height="19" viewBox="0 0 22 30" fill="none" xmlns="http://www.w3.org/2000/svg">
                            <path
                                d="M13.4136 15.0078C13.4193 13.558 12.5425 12.3793 11.4552 12.375C10.3679 12.3707 9.48184 13.5425 9.47612 14.9922C9.4704 16.4419 10.3472 17.6207 11.4345 17.625C12.5218 17.6293 13.4079 16.4575 13.4136 15.0078Z"
                                fill="black" />
                            <path
                                d="M19.976 15.0337C19.9818 13.584 19.105 12.4052 18.0177 12.4009C16.9304 12.3966 16.0443 13.5684 16.0386 15.0181C16.0328 16.4679 16.9096 17.6466 17.9969 17.6509C19.0842 17.6552 19.9703 16.4834 19.976 15.0337Z"
                                fill="black" />
                            <path
                                d="M6.85109 14.9819C6.85681 13.5321 5.98002 12.3534 4.89272 12.3491C3.80542 12.3448 2.91934 13.5166 2.91362 14.9663C2.9079 16.4161 3.78469 17.5948 4.87199 17.5991C5.9593 17.6034 6.84537 16.4316 6.85109 14.9819Z"
                                fill="black" />
                        </svg>
                    </button>

                    <!-- Menú Desplegable -->
                    <div class="dropdown absolute right-0 mt-2 w-40 bg-white border rounded shadow hidden z-10">
                        <a href="#" class="block px-4 py-2 text-sm hover:bg-blue-100">Ver Detalles</a>
                        <a href="#" class="block px-4 py-2 text-sm hover:bg-blue-100">Editar</a>
                        <a href="#" class="block px-4 py-2 text-sm hover:bg-blue-100">Eliminar</a>
                    </div>
                </td>
            </tr>

            <!-- Más filas vacías si quieres -->
        </tbody>
    </table>
    
    </div>
