<main class="w-full px-4 flex-1">

    <h2 class="text-4xl font-semibold mb-6 mt-2">Editar Servicio</h2>
    <div class="border-b-2 border-gray-300 w-full mb-8"></div>
    <div class="max-w-5xl mx-auto p-6 bg-white shadow-md rounded-xl">


        <form [formGroup]="serviceForm" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-3 gap-6">

            <!-- Código Servicio -->
            <div class="col-span-1">
                <label for="codigo_servicio" class="block text-sm font-medium text-black mb-1">
                    Código único <span class="text-red-600">*</span>
                </label>
                <input type="text" id="codigo_servicio" formControlName="service_code"
                    class="w-full border rounded px-3 py-2 text-sm text-black" />
            </div>

            <!-- Nombre -->
            <div class="col-span-1">
                <label for="nombre" class="block text-sm font-medium text-black mb-1">
                    Nombre del servicio <span class="text-red-600">*</span>
                </label>
                <input type="text" id="nombre" formControlName="name" maxlength="100"
                    class="w-full border rounded px-3 py-2 text-sm text-black" />
            </div>

            <!-- Unidad de Medida -->
            <div class="col-span-1">
                <label for="measurement_unit_id" class="block text-sm font-medium text-black mb-1">
                    Unidad de medida <span class="text-red-600">*</span>
                </label>
                <select formControlName="measurement_unit_id"
                    class="w-full px-3 py-2 border rounded-md shadow-sm focus:ring-2 focus:ring-cyan-500">
                    <option value="">Seleccione unidad</option>
                    <option *ngFor="let unit of measurementUnits" [value]="unit.id">
                        {{ unit.name }} ({{ unit.dian_code }})
                    </option>
                </select>
            </div>

            <!-- Precio unitario -->
            <div class="col-span-1">
                <label for="precio_unitario" class="block text-sm font-medium text-black mb-1">
                    Precio unitario <span class="text-red-600">*</span>
                </label>
                <input type="number" id="precio_unitario" formControlName="unit_price" min="0.01" step="0.01"
                    class="w-full border rounded px-3 py-2 text-sm text-black" />
            </div>

            <!-- Estado -->
            <div class="col-span-1">
                <label for="estado" class="block text-sm font-medium text-black mb-1">Estado</label>
                <select id="estado" formControlName="status"
                    class="w-full border rounded px-3 py-2 text-sm text-black bg-transparent focus:ring-0 focus:outline-none">
                    <option value="Active">Activo</option>
                    <option value="Inactive">Inactivo</option>
                </select>
            </div>

            <!-- Descripción -->
            <div class="col-span-full">
                <label for="descripcion" class="block text-sm font-medium text-black mb-1">Descripción</label>
                <textarea id="descripcion" formControlName="description" rows="3"
                    class="w-full border rounded px-3 py-2 text-sm text-black" placeholder="Opcional"></textarea>
            </div>

            <!-- Impuestos -->
            <div class="col-span-full">
                <label class="block text-sm font-medium text-black mb-2">Impuestos aplicados</label>
                <div *ngIf="taxes.length === 0" class="text-sm text-gray-500 mb-2">
                    Cargando impuestos...
                </div>
                <div *ngIf="taxes.length > 0" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-3 p-4 bg-gray-50 rounded-lg border border-gray-200">
                    <label *ngFor="let tax of taxes" 
                        class="flex items-center space-x-2 p-2 hover:bg-gray-100 rounded cursor-pointer">
                        <input type="checkbox" 
                            [checked]="isTaxSelected(tax.id)"
                            (change)="toggleTax(tax.id, $event)"
                            class="w-4 h-4 text-cyan-600 border-gray-300 rounded focus:ring-cyan-500">
                        <div class="flex-1">
                            <span class="text-sm font-medium text-gray-900">{{ tax.name }}</span>
                            <div class="text-xs text-gray-500">
                                <span *ngIf="tax.application_type === 'Porcentaje'">
                                    {{ tax.percentage }}%
                                </span>
                                <span *ngIf="tax.application_type === 'ValorFijo'">
                                    ${{ tax.fixed_value | number:'1.0-0' }}
                                </span>
                                <span *ngIf="tax.application_type === 'Retencion'">
                                    Retención {{ tax.percentage }}%
                                </span>
                                <span class="ml-2 text-gray-400">•</span>
                                <span class="ml-1">{{ tax.type }}</span>
                            </div>
                        </div>
                    </label>
                </div>
                <p class="text-xs text-gray-500 mt-2">
                    Seleccione los impuestos que aplican a este servicio
                </p>
            </div>

            <!-- Botones -->
            <div class="col-span-full flex justify-end gap-4 mt-6">
                <button type="submit" class="bg-cyan-600 text-white px-6 py-2 rounded hover:bg-cyan-700 disabled:bg-gray-400"
                    [disabled]="serviceForm.invalid || isLoading">
                    <span *ngIf="!isLoading">Guardar Cambios</span>
                    <span *ngIf="isLoading">Guardando...</span>
                </button>
                <button type="button" class="bg-gray-400 text-white px-6 py-2 rounded hover:bg-gray-500"
                    (click)="cancelar()" [disabled]="isLoading">
                    Cancelar
                </button>
            </div>
        </form>
    </div>
</main>
